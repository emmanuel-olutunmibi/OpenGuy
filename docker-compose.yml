version: '3.8'

services:
  openguy:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      ROBOT_MODE: simulator
      LOG_LEVEL: INFO
    volumes:
      - ./robot_notes:/app/robot_notes
      - ./robot_learning:/app/robot_learning
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - openguy
    restart: unless-stopped
    profiles: ["production"]

volumes:
  robot_notes:
  robot_learning:
